<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="logo">
        <svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="24" r="22" fill="#2d6a4f" stroke="#b7e4c7" stroke-width="2"/>
          <path d="M24 10 C24 10, 16 18, 16 26 C16 30.4 19.6 34 24 34 C28.4 34 32 30.4 32 26 C32 18 24 10 24 10Z" fill="#b7e4c7"/>
          <line x1="24" y1="18" x2="24" y2="34" stroke="#2d6a4f" stroke-width="1.5"/>
          <path d="M24 24 C20 20, 18 22, 18 24" stroke="#2d6a4f" stroke-width="1" fill="none"/>
          <path d="M24 28 C28 24, 30 26, 30 28" stroke="#2d6a4f" stroke-width="1" fill="none"/>
        </svg>
        <span class="site-title">{{ site.title }}</span>
      </div>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; {{ 'now' | date: '%Y' }} {{ site.title }}. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
